<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل | pptides</title>
  <meta name="description" content="أنت غير متصل حالياً. حاول مرة أخرى عند عودة الاتصال.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://pptides.com">
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cairo', 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .container {
      text-align: center;
      max-width: 520px;
    }
    
    .logo {
      margin-bottom: 2rem;
    }
    
    .logo svg {
      width: 64px;
      height: 64px;
    }
    
    .icon-container {
      width: 100px;
      height: 100px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, hsl(142 71% 45% / 0.2), hsl(142 71% 45% / 0.05));
      border: 1px solid hsl(142 71% 45% / 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 3s infinite;
    }
    
    .icon-container svg {
      width: 48px;
      height: 48px;
      color: hsl(142 71% 45%);
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 hsl(142 71% 45% / 0.3); }
      50% { transform: scale(1.02); box-shadow: 0 0 30px 10px hsl(142 71% 45% / 0.1); }
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.03em;
      color: #fafafa;
    }
    
    p {
      color: #a1a1aa;
      line-height: 1.7;
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: hsl(142 71% 45%);
      color: #0a0a0a;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px hsl(142 71% 45% / 0.3);
    }
    
    .btn svg {
      width: 20px;
      height: 20px;
    }
    
    .features {
      margin-top: 3rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    
    .feature {
      padding: 1.25rem;
      background: hsl(0 0% 10%);
      border: 1px solid hsl(0 0% 15%);
      border-radius: 12px;
    }
    
    .feature svg {
      width: 24px;
      height: 24px;
      color: hsl(142 71% 45%);
      margin-bottom: 0.75rem;
    }
    
    .feature h3 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    
    .feature p {
      font-size: 0.75rem;
      color: #71717a;
      margin-bottom: 0;
    }
    
    .status {
      margin-top: 2rem;
      padding: 1rem 1.5rem;
      background: hsl(142 71% 45% / 0.1);
      border: 1px solid hsl(142 71% 45% / 0.2);
      border-radius: 12px;
      font-size: 0.875rem;
      color: hsl(142 71% 45%);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status .dot {
      width: 8px;
      height: 8px;
      background: hsl(142 71% 45%);
      border-radius: 50%;
      animation: blink 2s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    @media (max-width: 600px) {
      .features {
        grid-template-columns: 1fr;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="28" stroke="hsl(142 71% 45%)" stroke-width="3"/>
        <circle cx="32" cy="32" r="18" stroke="hsl(142 71% 45% / 0.5)" stroke-width="2"/>
        <circle cx="32" cy="32" r="8" fill="hsl(142 71% 45%)"/>
      </svg>
    </div>
    
    <!-- Offline icon -->
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    
    <h1>أنت غير متصل</h1>
    <p>
      لا تقلق — بياناتك الصحية آمنة. سنقوم بمزامنة كل شيء تلقائياً عند عودة الاتصال.
    </p>
    
    <button class="btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      إعادة المحاولة
    </button>
    
    <div class="features">
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <h3>البيانات محفوظة</h3>
        <p>بياناتك الصحية مخزنة محلياً</p>
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <h3>مزامنة تلقائية</h3>
        <p>تتم المزامنة عند الاتصال</p>
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
        <h3>آمن</h3>
        <p>بياناتك مشفرة</p>
      </div>
    </div>
    
    <div class="status">
      <span class="dot"></span>
      جاري مراقبة حالة الاتصال...
    </div>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // Periodic connection check
    let checkCount = 0;
    const checkConnection = setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
      checkCount++;
      if (checkCount >= 60) { // Stop after 5 minutes
        clearInterval(checkConnection);
      }
    }, 5000);
  </script>
</body>
</html>
