<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#059669" />
  <title>غير متصل | pptides</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #fafaf9;
      color: #1c1917;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      direction: rtl;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0c0a09; color: #f5f5f4; }
      .card { background: #1c1917; border-color: #292524; }
      .btn { background: #059669; }
      .btn:hover { background: #047857; }
      .btn:disabled { background: #047857; opacity: 0.7; }
      .subtitle { color: #a8a29e; }
      .icon-bg { background: #1a2e23; }
      .retry-status { color: #6ee7b7; }
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 1.5rem;
      border: 1px solid #e7e5e4;
      padding: 3rem 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .icon-bg {
      width: 80px;
      height: 80px;
      border-radius: 1.25rem;
      background: #ecfdf5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-bg svg { width: 40px; height: 40px; color: #059669; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .subtitle { color: #78716c; font-size: 0.875rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #059669;
      color: white;
      font-weight: 700;
      font-size: 0.875rem;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      font-family: inherit;
    }
    .btn:hover { background: #047857; }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { cursor: default; opacity: 0.7; transform: none; }
    .logo { font-size: 1.125rem; font-weight: 800; letter-spacing: -0.5px; color: #1c1917; margin-bottom: 2rem; }
    .logo span { color: #059669; }
    .retry-status {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #059669;
      min-height: 1.25rem;
      transition: opacity 0.3s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @media (prefers-color-scheme: dark) {
      .logo { color: #f5f5f4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">pp<span>tides</span></div>
    <div class="icon-bg">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
      </svg>
    </div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p class="subtitle">تحقق من اتصالك بالإنترنت وحاول مرة أخرى. بعض المحتوى متاح في وضع عدم الاتصال.</p>
    <button class="btn" id="retryBtn" onclick="manualRetry()" aria-label="إعادة المحاولة">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
      حاول مرة أخرى
    </button>
    <div class="retry-status" id="retryStatus" aria-live="polite"></div>
  </div>

  <script>
    var retryCount = 0;
    var retryTimer = null;
    var RETRY_INTERVALS = [5000, 10000, 15000, 30000, 60000]; // escalating back-off

    function setStatus(msg) {
      document.getElementById('retryStatus').textContent = msg;
    }

    function scheduleRetry() {
      var delay = RETRY_INTERVALS[Math.min(retryCount, RETRY_INTERVALS.length - 1)];
      var secs = Math.round(delay / 1000);
      setStatus('إعادة المحاولة خلال ' + secs + ' ثانية…');
      retryTimer = setTimeout(autoRetry, delay);
    }

    function autoRetry() {
      retryCount++;
      setStatus('جارٍ التحقق من الاتصال…');
      // Attempt a lightweight HEAD request to verify connectivity
      fetch('/favicon.ico', { method: 'HEAD', cache: 'no-store' })
        .then(function(res) {
          if (res.ok || res.status === 304) {
            setStatus('✓ تم استعادة الاتصال! جارٍ إعادة التوجيه…');
            setTimeout(function() { window.location.href = '/'; }, 800);
          } else {
            scheduleRetry();
          }
        })
        .catch(function() {
          scheduleRetry();
        });
    }

    function manualRetry() {
      clearTimeout(retryTimer);
      var btn = document.getElementById('retryBtn');
      btn.disabled = true;
      btn.setAttribute('aria-busy', 'true');
      setStatus('جارٍ التحقق…');
      fetch('/favicon.ico', { method: 'HEAD', cache: 'no-store' })
        .then(function(res) {
          btn.removeAttribute('aria-busy');
          if (res.ok || res.status === 304) {
            setStatus('✓ تم استعادة الاتصال! جارٍ إعادة التوجيه…');
            setTimeout(function() { window.location.href = '/'; }, 800);
          } else {
            btn.disabled = false;
            setStatus('لا يزال الاتصال منقطعًا.');
            scheduleRetry();
          }
        })
        .catch(function() {
          btn.disabled = false;
          btn.removeAttribute('aria-busy');
          setStatus('لا يزال الاتصال منقطعًا.');
          scheduleRetry();
        });
    }

    // Auto-reload the moment the browser knows it's back online
    window.addEventListener('online', function() {
      clearTimeout(retryTimer);
      setStatus('✓ تم استعادة الاتصال! جارٍ إعادة التوجيه…');
      setTimeout(function() { window.location.href = '/'; }, 500);
    });

    // Start the retry loop after a short delay
    setTimeout(scheduleRetry, 3000);
  </script>
</body>
</html>
