<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل | pptides</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #fafaf9;
      color: #1c1917;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      direction: rtl;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0c0a09; color: #f5f5f4; }
      .card { background: #1c1917; border-color: #292524; }
      .btn { background: #059669; }
      .btn:hover { background: #047857; }
      .subtitle { color: #a8a29e; }
      .icon-bg { background: #1a2e23; }
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 1.5rem;
      border: 1px solid #e7e5e4;
      padding: 3rem 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .icon-bg {
      width: 80px;
      height: 80px;
      border-radius: 1.25rem;
      background: #ecfdf5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-bg svg { width: 40px; height: 40px; color: #059669; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .subtitle { color: #78716c; font-size: 0.875rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #059669;
      color: white;
      font-weight: 700;
      font-size: 0.875rem;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      font-family: inherit;
    }
    .btn:hover { background: #047857; }
    .btn:active { transform: scale(0.96); }
    .logo { font-size: 1.125rem; font-weight: 800; letter-spacing: -0.5px; color: #1c1917; margin-bottom: 2rem; }
    .logo span { color: #059669; }
    @media (prefers-color-scheme: dark) {
      .logo { color: #f5f5f4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">pp<span>tides</span></div>
    <div class="icon-bg">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
      </svg>
    </div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p class="subtitle">تحقق من اتصالك بالإنترنت وحاول مرة أخرى. بعض المحتوى متاح في وضع عدم الاتصال.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
      حاول مرة أخرى
    </button>
  </div>
</body>
</html>
