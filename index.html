      }
      /* Hero content skeleton using multi-layer background trick */
      #root:empty::after {
        content:'';
        flex:1;
        background-color:#fafaf9;
        background-image:
          /* pill badge */
          linear-gradient(#d1fae5 0%,#d1fae5 100%),
          /* headline line 1 */
          linear-gradient(#e7e5e4 0%,#e7e5e4 100%),
          /* headline line 2 */
          linear-gradient(#e7e5e4 0%,#e7e5e4 100%),
          /* sub-headline */
          linear-gradient(#e7e5e4 0%,#e7e5e4 100%),
          /* sub-headline line 2 */
          linear-gradient(#e7e5e4 0%,#e7e5e4 100%),
          /* CTA primary button */
          linear-gradient(#059669 0%,#059669 100%),
          /* CTA secondary button */
          linear-gradient(#e7e5e4 0%,#e7e5e4 100%);
        background-repeat: no-repeat;
        background-size:
          160px 32px,
          55% 40px,
          45% 40px,
          60% 20px,
          50% 20px,
          220px 52px,
          160px 52px;
        background-position:
          calc(50% - 0px) 40px,
          calc(50% - 0px) 100px,
          calc(50% - 0px) 156px,
          calc(50% - 0px) 224px,
          calc(50% - 0px) 256px,
          calc(50% - 106px) 308px,
          calc(50% + 110px) 308px;
        animation:skeleton-shimmer 1.6s ease-in-out infinite;
      }
      .dark #root:empty::after {
        background-color:#0c0a09;
        background-image:

          linear-gradient(#292524 0%,#292524 100%),
          linear-gradient(#292524 0%,#292524 100%),
          linear-gradient(#292524 0%,#292524 100%),
          linear-gradient(#047857 0%,#047857 100%),

  <body>
    <script>
      // Prevent flash of wrong theme — apply dark class before paint
      (function(){try{var t=localStorage.getItem('pptides_theme');if(t==='dark'||(t==null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}}catch(e){}})();
      // Force-clear stale service workers and caches to prevent broken page navigation
      // This runs once per build hash — won't re-run on same build
      (function(){try{var BUILD='20260315b';var k='pptides_sw_build';if(localStorage.getItem(k)!==BUILD){localStorage.setItem(k,BUILD);if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister()});});if(typeof caches!=='undefined'){caches.keys().then(function(names){names.forEach(function(name){caches.delete(name)})})}}}}catch(e){}})();
    </script>
