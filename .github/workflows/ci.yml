name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (non-blocking)
        run: pnpm run lint || true

      - name: Type-check
        run: pnpm run type-check

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build & Size Check
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Bundle size report
        id: size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Chunk | Size | Gzip |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/*.js; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            raw=$(wc -c < "$f" | xargs)
            gz=$(gzip -c "$f" | wc -c | xargs)
            raw_kb=$(echo "scale=1; $raw/1024" | bc)
            gz_kb=$(echo "scale=1; $gz/1024" | bc)
            echo "| \`$name\` | ${raw_kb} KB | ${gz_kb} KB |" >> $GITHUB_STEP_SUMMARY
          done
          total=$(find dist -name '*.js' -not -name '*.map' -exec cat {} + | wc -c | xargs)
          total_kb=$(echo "scale=1; $total/1024" | bc)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total JS:** ${total_kb} KB" >> $GITHUB_STEP_SUMMARY

          if [ "$total" -gt 2097152 ]; then
            echo "::error::Total JS bundle exceeds 2 MB ($total_kb KB)"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
