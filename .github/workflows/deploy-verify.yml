name: Post-Deploy Verify

on:
  push:
    branches: [main]

concurrency:
  group: verify-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for Vercel deploy
        run: sleep 120

      - name: Verify deployment is live
        run: |
          echo "=== Checking production site ==="

          HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" https://pptides.com/ 2>/dev/null)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: Landing page returned $HTTP_CODE"
            exit 1
          fi
          echo "PASS: Landing page 200"

          for page in /library /pricing /login /contact /community /peptide/bpc-157 /blog; do
            CODE=$(curl -so /dev/null -w "%{http_code}" "https://pptides.com${page}" 2>/dev/null)
            if [ "$CODE" != "200" ]; then
              echo "FAIL: $page returned $CODE"
              exit 1
            fi
            echo "PASS: $page 200"
          done

          for api in /api/sitemap /api/og; do
            CODE=$(curl -so /dev/null -w "%{http_code}" "https://pptides.com${api}" 2>/dev/null)
            if [ "$CODE" != "200" ]; then
              echo "FAIL: $api returned $CODE"
              exit 1
            fi
            echo "PASS: $api 200"
          done

          HEADERS=$(curl -sI https://pptides.com/ 2>/dev/null)
          for header in "strict-transport-security" "x-frame-options" "x-content-type-options"; do
            if echo "$HEADERS" | grep -qi "$header"; then
              echo "PASS: $header present"
            else
              echo "FAIL: $header missing"
              exit 1
            fi
          done

          echo ""
          echo "=== ALL CHECKS PASSED ==="

      - name: Notify on failure
        if: failure()
        run: echo "::error::Production verification FAILED"
